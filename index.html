<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umzug: GIANT HAUL</title>
  <meta http-equiv="refresh" content="5; URL=https://ricardohipp.github.io/giant-haul/" />
  <style>
    body {
      background: #0d0e10;
      color: #fff;
      font-family: 'Roboto Condensed', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .box {
      background: linear-gradient(160deg, #2c2f33 0%, #1a1c1f 100%);
      border: 3px solid #f37021;
      padding: 60px 40px;
      border-radius: 24px;
      box-shadow: 0 0 50px rgba(243, 112, 33, 0.3);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .haul-text {
      color: #f37021;
      font-size: 56px;
      font-weight: 900;
      display: block;
      margin-top: 10px;
      text-shadow: 0 0 15px rgba(243, 112, 33, 0.5);
    }

    p {
      color: #b0b4b9;
      font-size: 18px;
      margin-top: 30px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      background: linear-gradient(180deg, #f37021 0%, #d45f10 100%);
      color: white;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(243, 112, 33, 0.4);
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .countdown {
      font-size: 14px;
      color: #555;
      margin-top: 25px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>TITAN TOWER heißt jetzt <br><span class="haul-text">GIANT HAUL</span></h1>
    <p>Wir haben das Spiel massiv verbessert und sind auf eine neue Adresse umgezogen!</p>
    <a href="https://ricardohipp.github.io/giant-haul/" class="btn">ZUM NEUEN SPIEL</a>
    <div class="countdown">Automatischer Umzug in 5 Sekunden...</div>
  </div>
</body>

</html>
